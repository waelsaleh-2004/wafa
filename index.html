<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
    <div class="img">
        <img src="img/IMG-20260628-WA0005.jpg" alt="logo">
    </div>
    <div class="progress">
        Question <span id="current">1</span> / <span id="total">5</span>
    </div>

    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <h2 id="question">
        ما هي لغة البرمجة المستخدمة لتطوير الويب؟
    </h2>

    <div id="answers"></div>

    <button id="nextBtn">السؤال التالي</button>

    <div id="resultContainer" class="score-box" style="display: none;">
        انتهى الاختبار 🎉 النتيجة:
        <span id="scoreText">0 / 5</span>
    </div>
</div>

<!-- شاشة "أحسنت!" المنبثقة للإجابة الصحيحة -->
<div id="successModal" class="modal">
    <div class="modal-content">
        <div class="checkmark-circle">
            <div class="checkmark"></div>
        </div>
        <h3>أحسنت! 🎉</h3>
        <p>إجابة صحيحة وممتازة</p>
    </div>
</div>

<!-- شاشة "حاول مجدداً" المنبثقة المشجعة للإجابة الخاطئة -->
<div id="errorModal" class="modal">
    <div class="modal-content error-content">
        <div class="cross-circle">
            <div class="cross-line line1"></div>
            <div class="cross-line line2"></div>
        </div>
        <h3>للأسف، إجابة خاطئة! 🤔</h3>
        <p id="correctAnswerHint">الإجابة الصحيحة هي: </p>
    </div>
</div>

<!-- شاشة التنبيه المنبثقة الجديدة لاختيار إجابة أولاً -->
<div id="warningModal" class="modal">
    <div class="modal-content warning-content">
        <div class="warning-circle">
            <div class="warning-exclamation">!</div>
        </div>
        <h3>تنبيه ⚠️</h3>
        <p>الرجاء الإجابة على السؤال أولاً قبل الانتقال!</p>
    </div>
</div>

<script src="./main.js"></script>
</body>
</html>
